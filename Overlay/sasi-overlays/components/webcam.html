<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../lib/theme-tokens.css">
<title>Sasi Streams — Webcam Frame</title>
<script src="../config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:transparent;
  font-family:'Arial Black', Impact, Arial, sans-serif;
}

/* ── Frame container ── */
.cam-wrap {
  position:absolute;
  opacity:0; animation:camIn .6s ease .2s forwards;
}
@keyframes camIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }

/* ── Outer frame ── */
.cam-frame {
  position:relative;
  border:2px solid rgba(var(--red-rgb),.35);
  border-radius:10px;
  background:transparent;
  box-shadow:
    0 0 20px rgba(var(--red-rgb),.1),
    0 0 40px rgba(var(--red-rgb),.04),
    inset 0 0 20px rgba(0,0,0,.3);
  overflow:visible;
}

/* Top gradient line */
.cam-frame::before {
  content:''; position:absolute; top:-1px; left:10px; right:10px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--red-rgb),.5),transparent);
  z-index:2;
}

/* ── Corner ticks — all 4 corners ── */
.tick { position:absolute; z-index:3; }

/* Top-left */
.tick.tl-h { top:-1px; left:-1px; width:22px; height:2px; background:var(--red); box-shadow:0 0 8px var(--red); }
.tick.tl-v { top:-1px; left:-1px; width:2px; height:22px; background:var(--red); box-shadow:0 0 8px var(--red); }

/* Top-right */
.tick.tr-h { top:-1px; right:-1px; width:22px; height:2px; background:var(--red); box-shadow:0 0 8px var(--red); }
.tick.tr-v { top:-1px; right:-1px; width:2px; height:22px; background:var(--red); box-shadow:0 0 8px var(--red); }

/* Bottom-left */
.tick.bl-h { bottom:-1px; left:-1px; width:22px; height:2px; background:var(--orange); box-shadow:0 0 6px var(--orange); }
.tick.bl-v { bottom:-1px; left:-1px; width:2px; height:22px; background:var(--orange); box-shadow:0 0 6px var(--orange); }

/* Bottom-right */
.tick.br-h { bottom:-1px; right:-1px; width:22px; height:2px; background:var(--orange); box-shadow:0 0 6px var(--orange); }
.tick.br-v { bottom:-1px; right:-1px; width:2px; height:22px; background:var(--orange); box-shadow:0 0 6px var(--orange); }

/* ── Subtle animated glow pulse on the border ── */
.cam-frame {
  animation:borderPulse 3s ease-in-out infinite;
}
@keyframes borderPulse {
  0%,100% { box-shadow:0 0 20px rgba(var(--red-rgb),.1), 0 0 40px rgba(var(--red-rgb),.04), inset 0 0 20px rgba(0,0,0,.3); }
  50%     { box-shadow:0 0 28px rgba(var(--red-rgb),.18), 0 0 50px rgba(var(--red-rgb),.08), inset 0 0 20px rgba(0,0,0,.3); }
}

/* ── Label under frame ── */
.cam-label {
  position:absolute; left:0; right:0; text-align:center;
  bottom:-22px;
  font-size:7px; font-weight:700; letter-spacing:5px;
  color:rgba(255,255,255,.2); text-transform:uppercase;
}
</style>
</head>
<body>

<div class="cam-wrap" id="cam-wrap">
  <div class="cam-frame" id="cam-frame">
    <!-- Corner ticks -->
    <div class="tick tl-h"></div><div class="tick tl-v"></div>
    <div class="tick tr-h"></div><div class="tick tr-v"></div>
    <div class="tick bl-h"></div><div class="tick bl-v"></div>
    <div class="tick br-h"></div><div class="tick br-v"></div>
    <!-- Label -->
    <div class="cam-label" id="cam-label"></div>
  </div>
</div>

<script>
const wc = SASI_CONFIG.webcam;
const wrap  = document.getElementById('cam-wrap');
const frame = document.getElementById('cam-frame');
const label = document.getElementById('cam-label');

// Size
frame.style.width  = wc.width  + 'px';
frame.style.height = wc.height + 'px';

// Position
const m = wc.margin;
switch (wc.position) {
  case 'bottom-left':
    wrap.style.bottom = m + 'px';
    wrap.style.left   = m + 'px';
    break;
  case 'bottom-right':
    wrap.style.bottom = m + 'px';
    wrap.style.right  = m + 'px';
    break;
  case 'top-left':
    wrap.style.top  = m + 'px';
    wrap.style.left = m + 'px';
    break;
  case 'top-right':
    wrap.style.top   = m + 'px';
    wrap.style.right = m + 'px';
    break;
}

// Label
function setLabel(v) {
  const text = v != null ? v : (wc.label || '');
  if (text) { label.textContent = text; label.style.display = ''; }
  else { label.style.display = 'none'; }
}
setLabel();
</script>

<script src="../lib/live-update.js"></script>
<script>
// Sasi Studio v2 — live updates from dashboard
if (window.registerLiveUpdater) {
  registerLiveUpdater('webcam_label', setLabel);
  registerLiveUpdater('cRed',    liveUpdate.cssVar('--red'));
  registerLiveUpdater('cOrange', liveUpdate.cssVar('--orange'));
  registerLiveUpdater('cGold',   liveUpdate.cssVar('--gold'));
  applyLiveUpdaters();
}
</script>
</body>
</html>
