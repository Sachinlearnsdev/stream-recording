<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../lib/theme-tokens.css">
<link rel="stylesheet" href="../lib/scene-base.css">
<title>Sasi Streams — Terminal Alerts</title>
<!--
  TERMINAL ALERTS — standalone OBS browser source
  ──────────────────────────────────────────────────────────────
  A "dev log stream" style alert overlay. Shows recent events
  (FOLLOW / SUB / CHEER / TIP / RAID) as aligned log rows inside
  a terminal-window chrome. New events fade in at the bottom with
  a red left-edge highlight, older rows dim as they age, oldest
  row drops after 5 rows.

  Usage in OBS:
    Browser source → file://…/sasi-overlays/components/terminal-alerts.html
    Size: 1920 × 1080 (transparent body so it layers over the scene)

  To wire real StreamElements alerts, hook window.__TERMINAL_ALERTS.push(...)
  from alerts.js (see integration note at the bottom of this file).
-->
<script src="../lib/config.js"></script>
<style>
/* ───────── Brand-scoped tokens come from config.js but mirror defaults here
            so the file still renders if opened standalone ───────── */


body {
  width:1920px; height:1080px; overflow:hidden;
  background:transparent;
  font-family:'JetBrains Mono','Fira Code','Consolas','Courier New',monospace;
  color:#fff;
}

/* ═════════ Terminal window — positioned top-left by default ═════════ */
.term {
  position:absolute;
  top:64px; left:64px;
  width:540px;
  background:rgba(0,0,0,.84);
  border:1px solid rgba(var(--red-rgb),.38);
  border-radius:var(--corner-radius);
  box-shadow:
    0 18px 50px rgba(0,0,0,.55),
    0 0 60px rgba(var(--red-rgb),.1),
    inset 0 0 30px rgba(0,0,0,.55);
  overflow:hidden;
  opacity:0; transform:translateY(8px);
  animation:termIn .5s ease .2s forwards;
}
@keyframes termIn { to { opacity:1; transform:translateY(0); } }

.term::after {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(180deg, transparent 0, transparent 2px, rgba(255,255,255,.025) 2px, rgba(255,255,255,.025) 3px);
  pointer-events:none; z-index:20;
}
.term::before {
  content:''; position:absolute; top:0; left:10px; right:10px; height:1px;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
  z-index:21;
}

/* ───── Header ───── */
.term-head {
  display:flex; align-items:center;
  padding:11px 16px 10px;
  background:rgba(255,255,255,.03);
  border-bottom:1px solid rgba(255,255,255,.08);
  position:relative;
}
.dots { display:flex; gap:7px; }
.dot { width:10px; height:10px; border-radius:50%; border:1px solid rgba(0,0,0,.35); }
.dot.red { background:#ff5f56; }
.dot.yel { background:#ffbd2e; }
.dot.grn { background:#27c93f; }
.term-title {
  position:absolute; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,255,255,.42);
}
.term-stat {
  margin-left:auto;
  display:flex; align-items:center; gap:6px;
  padding:3px 9px 3px 7px;
  background:rgba(0,255,156,.08);
  border:1px solid rgba(0,255,156,.32);
  border-radius:3px;
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  color:var(--term-green);
}
.term-stat.offline {
  color:#ff5f56; background:rgba(255,95,86,.08); border-color:rgba(255,95,86,.32);
}
.term-stat.offline .stat-dot { background:#ff5f56; box-shadow:0 0 6px #ff5f56; }
.stat-dot {
  width:6px; height:6px; border-radius:50%; background:var(--term-green);
  box-shadow:0 0 6px var(--term-green);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ───── Body ───── */
.term-body {
  padding:14px 18px 12px;
  font-size:12px; line-height:1.5;
  position:relative;
}

.boot {
  display:flex; align-items:center; justify-content:space-between;
  font-size:12px;
  margin-bottom:10px;
  padding-bottom:9px;
  border-bottom:1px dashed rgba(255,255,255,.08);
}
.boot-left { color:var(--term-green); text-shadow:0 0 6px rgba(0,255,156,.4); }
.boot-left .cmd { color:#fff; font-weight:700; }
.boot-right {
  font-size:10px; color:var(--term-muted);
  display:flex; align-items:center; gap:6px;
}
.boot-right::before {
  content:''; width:5px; height:5px; border-radius:50%;
  background:var(--term-green); box-shadow:0 0 4px var(--term-green);
}

/* ───── Log stream — 2 old rows + 1 big featured row at the bottom ───── */
.log {
  display:flex; flex-direction:column;
  gap:0;
  min-height:120px;
}
.log-row {
  display:flex; align-items:center; gap:12px;
  padding:2px 8px 2px 10px;
  border-radius:3px;
  position:relative;
  opacity:.5;
  transition:
    font-size .45s ease,
    padding .45s ease,
    gap .45s ease,
    opacity .45s ease,
    background .45s ease;
}
.log-row.enter { animation:rowIn .35s ease; }
@keyframes rowIn { from { opacity:0; transform:translateY(6px); } }

.log-row .ts   { flex-shrink:0; width:58px; }
.log-row .chip { flex-shrink:0; }
.log-row .user { flex-shrink:0; min-width:110px; }
.log-row .meta { flex:1; min-width:0; }

.log-row.old   { opacity:.45; }
.log-row.older { opacity:.22; }

/* ═══ FEATURED — the newest alert, bigger + highlighted ═══ */
.log-row.featured {
  font-size:17px;
  padding:13px 14px 13px 16px;
  gap:16px;
  opacity:1;
  background:linear-gradient(90deg, rgba(var(--red-rgb),.22), rgba(var(--red-rgb),0) 70%);
  margin-top:6px;
}
.log-row.featured::before {
  content:''; position:absolute; left:0; top:7px; bottom:7px; width:3px;
  background:var(--red);
  box-shadow:0 0 9px var(--red), 0 0 18px rgba(var(--red-rgb),.55);
  border-radius:2px;
}
.log-row.featured .ts   { width:84px; font-size:15px; }
.log-row.featured .chip { font-size:12px; padding:3px 12px; min-width:88px; }
.log-row.featured .user { font-size:18px; }
.log-row.featured .meta { font-size:17px; }

.ts    { color:var(--term-muted); font-size:10px; transition:font-size .45s ease, width .45s ease; }
.user  { color:#fff; padding:0 2px; font-size:11px; border-bottom:1px dashed var(--orange); transition:font-size .45s ease; }
.meta  { color:var(--gold); font-weight:600; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:font-size .45s ease; }

.chip {
  display:inline-block;
  padding:1px 7px;
  font-size:9px; font-weight:900; letter-spacing:1.2px;
  border-radius:3px;
  text-transform:uppercase;
  text-align:center;
  min-width:62px;
  border:1px solid currentColor;
  transition:font-size .45s ease, padding .45s ease, min-width .45s ease;
}
.chip.follow { color:var(--orange);    background:rgba(var(--orange-rgb),.1);  box-shadow:0 0 6px rgba(var(--orange-rgb),.25); }
.chip.sub    { color:var(--gold);      background:rgba(var(--gold-rgb),.1);  box-shadow:0 0 6px rgba(var(--gold-rgb),.25); }
.chip.cheer  { color:var(--term-cyan); background:rgba(85,204,255,.1); box-shadow:0 0 6px rgba(85,204,255,.25); }
.chip.tip    { color:var(--term-green);background:rgba(0,255,156,.1);  box-shadow:0 0 6px rgba(0,255,156,.25); }
.chip.raid   { color:var(--red);       background:rgba(var(--red-rgb),.12);  box-shadow:0 0 6px rgba(var(--red-rgb),.25); }

/* ───── Prompt line ───── */
.prompt-line {
  margin-top:10px;
  padding-top:8px;
  border-top:1px dashed rgba(255,255,255,.08);
  display:flex; align-items:center; gap:8px;
  font-size:11px;
  color:var(--term-muted);
}
.prompt-line .arrow { color:var(--term-green); text-shadow:0 0 6px rgba(0,255,156,.4); }
.cursor {
  display:inline-block; width:8px; height:15px;
  background:var(--term-green); vertical-align:-2px; margin-left:4px;
  animation:blink .7s step-end infinite;
  box-shadow:0 0 8px var(--term-green);
}
</style>
</head>
<body>

<div class="term">
  <div class="term-head">
    <div class="dots">
      <span class="dot red"></span>
      <span class="dot yel"></span>
      <span class="dot grn"></span>
    </div>
    <div class="term-title" data-bind="term_title">sasi@streams &mdash; alerts.log</div>
    <div class="term-stat" id="stat">
      <span class="stat-dot"></span>
      <span id="stat-text">CONNECTED</span>
    </div>
  </div>

  <div class="term-body">
    <div class="boot">
      <div class="boot-left">$ <span class="cmd">alerts.listen</span>()</div>
      <div class="boot-right" id="boot-right">pid 2847 &middot; yt+twitch</div>
    </div>

    <div class="log" id="log"></div>

    <div class="prompt-line">
      <span class="arrow">&gt;</span>
      <span>waiting for next event</span>
      <span class="cursor"></span>
    </div>
  </div>
</div>

<script>
// ═════════════════════════════════════════════════════════════
//  TERMINAL ALERTS CONTROLLER
//  Public API:  window.__TERMINAL_ALERTS.push({ type, user, meta })
//
//  Integration with alerts.js (later): in alerts.js showPopup(),
//  after rendering the real popup, also call:
//    window.__TERMINAL_ALERTS?.push({
//      type: event.type, user: event.name,
//      meta: event.type === 'tip' ? (event.currency+event.amount)
//           : event.type === 'cheer' ? (event.amount+' bits')
//           : event.type === 'sub' ? ('tier '+(event.tier||1))
//           : event.type === 'raid' ? (event.amount+' viewers')
//           : '+1 follower'
//    });
// ═════════════════════════════════════════════════════════════

(function() {
  const log = document.getElementById('log');
  const MAX_ROWS = 3;

  const CHIP_MAP = {
    follower:'follow', follow:'follow',
    subscriber:'sub',  sub:'sub',
    cheer:'cheer',     bits:'cheer',
    tip:'tip',         donation:'tip',
    raid:'raid',       host:'raid',
  };

  function timeNow(offsetSec) {
    const d = new Date(Date.now() - (offsetSec || 0) * 1000);
    return d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function buildRow({ type, user, meta }, ts) {
    const chipClass = CHIP_MAP[(type || '').toLowerCase()] || 'follow';
    const typeLabel = (type || 'event').toUpperCase();
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="chip ${chipClass}">${typeLabel}</span>
      <span class="user">@${user || 'anon'}</span>
      <span class="meta">${meta || ''}</span>
    `;
    return row;
  }

  function applyTiers() {
    // Newest row (last child) = featured. Only 2 old rows above it.
    const rows = Array.from(log.children);
    rows.forEach((r, i) => {
      r.classList.remove('featured', 'old', 'older');
      const pos = rows.length - 1 - i; // 0 = newest
      if (pos === 0)      r.classList.add('featured');
      else if (pos === 1) r.classList.add('old');
      else                r.classList.add('older');
    });
  }

  function addRow(evt) {
    const row = buildRow(evt || {}, timeNow());
    row.classList.add('enter');
    log.appendChild(row);
    setTimeout(() => row.classList.remove('enter'), 400);

    applyTiers();
    while (log.children.length > MAX_ROWS) log.firstChild.remove();
  }

  // Public push API — alerts.js or anything else can call this
  window.__TERMINAL_ALERTS = { push: addRow };

  // ─── Fake/dev mode: cycle through demo events on a timer ───
  // Uses the global fakeAlerts flag from config.js
  const isFake = window.SASI_CONFIG && SASI_CONFIG.fakeAlerts;
  if (isFake) {
    const DEMO = [
      { type:'follow', user:'ember_92', meta:'+1 follower' },
      { type:'sub',    user:'mikhail',  meta:'tier 1 · month 3' },
      { type:'cheer',  user:'cozyfox',  meta:'500 bits' },
      { type:'tip',    user:'raven_b',  meta:'₹1,250' },
      { type:'raid',   user:'jules',    meta:'48 viewers' },
      { type:'follow', user:'kai_h',    meta:'+1 follower' },
      { type:'sub',    user:'sora',     meta:'tier 2 · new' },
      { type:'cheer',  user:'tanvi',    meta:'1,000 bits' },
    ];

    // Seed 3 rows (2 old + 1 featured) so the log isn't empty on load
    DEMO.slice(0, 3).forEach((e, i) => {
      const ageSec = (3 - i) * 45;
      log.appendChild(buildRow(e, timeNow(ageSec)));
    });
    applyTiers();

    let i = 3;
    setTimeout(function tick() {
      addRow(DEMO[i % DEMO.length]);
      i++;
      setTimeout(tick, 3400 + Math.random() * 1600);
    }, 1800);
  }
})();
</script>

<script src="../lib/live-update.js"></script>
<script>
// Sasi Studio v2 — live updates from dashboard
if (window.registerLiveUpdater) {
  registerLiveUpdater('term_title', liveUpdate.text('[data-bind="term_title"]'));
  applyLiveUpdaters();
}
</script>
</body>
</html>
