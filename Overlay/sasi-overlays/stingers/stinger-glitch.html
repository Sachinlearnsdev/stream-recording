<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sasi Streams — Glitch Stinger Export</title>
<script src="../lib/config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#000;
  font-family:'Arial Black', Impact, Arial, sans-serif;
  display:flex; align-items:center; justify-content:center;
}
canvas { display:block; }
.ui {
  position:absolute; inset:0; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; background:rgba(0,0,0,.95);
}
.ui.hidden { display:none; }
.ui h1 { font-size:28px; color:#fff; letter-spacing:4px; }
.ui p  { font-size:14px; color:rgba(255,255,255,.5); letter-spacing:2px; max-width:600px; text-align:center; line-height:1.6; }
.ui button {
  padding:14px 40px; border:2px solid var(--red, #FF2200); background:transparent;
  color:#fff; font-family:inherit; font-size:14px; font-weight:900;
  letter-spacing:4px; cursor:pointer; border-radius:6px;
  transition:background .2s, box-shadow .2s;
}
.ui button:hover { background:rgba(255,34,0,.15); box-shadow:0 0 20px rgba(255,34,0,.3); }
.ui .status { font-size:12px; color:var(--orange, #FF7700); letter-spacing:3px; max-width:600px; text-align:center; }
</style>
</head>
<body>

<canvas id="c" width="1920" height="1080"></canvas>

<div class="ui" id="ui">
  <h1>GLITCH STINGER</h1>
  <p>Click to record and download.</p>
  <button onclick="startExport()">RECORD & DOWNLOAD</button>
  <div class="status" id="status"></div>
</div>

<script>
const SC  = SASI_CONFIG;
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const ui  = document.getElementById('ui');
const sts = document.getElementById('status');

const red  = SC.colors.red;
const org  = SC.colors.orange;
const bg   = SC.colors.bg;
const cyan = '#00E5FF';
const mag  = '#FF00AA';

// ─── Timing: beat-based glitch ─────────────────────
// Beat 1:  quick flicker hit         0 → 200ms
// Calm 1:  dark with static        200 → 380ms
// Beat 2:  bigger hit, tears        380 → 650ms
// Calm 2:  dark, more tension       650 → 780ms
// Beat 3:  maximum chaos → slam     780 → 1100ms
// Black:   solid black              1100 → 1400ms
const TOTAL = 900;
const TP    = 750;

// Beats: [start, end]
const B1 = [0, 120];
const B2 = [200, 400];
const B3 = [480, 750];

function inBeat(t, beat) {
  return t >= beat[0] && t < beat[1];
}
function beatProgress(t, beat) {
  return Math.max(0, Math.min(1, (t - beat[0]) / (beat[1] - beat[0])));
}

function drawFrame(t) {
  // ── Base: dark ──
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 1920, 1080);

  // After beat 3 → solid black, done
  if (t >= B3[1]) return;

  // ── Overall tension: subtle red vignette that builds between beats ──
  const tension = Math.min(1, t / 1000);
  if (tension > 0.1) {
    const vg = ctx.createRadialGradient(960, 540, 200, 960, 540, 1100);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, red);
    ctx.globalAlpha = tension * 0.08;
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, 1920, 1080);
    ctx.globalAlpha = 1;
  }

  // ════════════════════════════════════════
  // BEAT 1 — quick flicker + color flash
  // ════════════════════════════════════════
  if (inBeat(t, B1)) {
    const p = beatProgress(t, B1);

    // Blackout flicker at the start
    if (p < 0.15) {
      // nothing — screen goes black for a beat
    } else if (p < 0.25) {
      // Red flash
      ctx.fillStyle = red;
      ctx.globalAlpha = 0.6;
      ctx.fillRect(0, 0, 1920, 1080);
      ctx.globalAlpha = 1;
    } else if (p < 0.35) {
      // Black again
    } else if (p < 0.5) {
      // Orange flash
      ctx.fillStyle = org;
      ctx.globalAlpha = 0.4;
      ctx.fillRect(0, 0, 1920, 1080);
      ctx.globalAlpha = 1;
    } else if (p < 0.6) {
      // Black
    } else {
      // Horizontal tear — a few bands displaced
      for (let i = 0; i < 4; i++) {
        const y = 180 + i * 220;
        const h = 20 + Math.random() * 40;
        const shift = (Math.random() > 0.5 ? 1 : -1) * (15 + Math.random() * 30);
        ctx.fillStyle = i % 2 === 0 ? red : cyan;
        ctx.globalAlpha = 0.25;
        ctx.fillRect(shift, y, 1920, h);
      }
      ctx.globalAlpha = 1;
    }
  }

  // ── Calm 1 — subtle static ──
  if (t >= B1[1] && t < B2[0]) {
    // Faint horizontal lines
    for (let y = 0; y < 1080; y += 6) {
      if (Math.random() > 0.92) {
        ctx.fillStyle = red;
        ctx.globalAlpha = 0.05;
        ctx.fillRect(0, y, 1920, 2);
      }
    }
    ctx.globalAlpha = 1;
  }

  // ════════════════════════════════════════
  // BEAT 2 — bigger: tears + RGB split + shake
  // ════════════════════════════════════════
  if (inBeat(t, B2)) {
    const p = beatProgress(t, B2);

    // Screen shake via translate
    const shakeX = Math.sin(t * 0.15) * (5 + p * 20);
    const shakeY = Math.cos(t * 0.12) * (3 + p * 10);

    // RGB split — red vs cyan
    const split = 8 + p * 35;
    ctx.fillStyle = red;
    ctx.globalAlpha = 0.12 + p * 0.15;
    ctx.fillRect(-split + shakeX, shakeY, 1920, 1080);
    ctx.fillStyle = cyan;
    ctx.globalAlpha = 0.1 + p * 0.12;
    ctx.fillRect(split + shakeX, shakeY, 1920, 1080);
    ctx.globalAlpha = 1;

    // Horizontal tears — thick bands shifted left/right
    const tearCount = 3 + Math.floor(p * 8);
    for (let i = 0; i < tearCount; i++) {
      const tearY = (i / tearCount) * 1080 + Math.sin(t * 0.02 + i) * 40;
      const tearH = 10 + p * 50;
      const tearShift = Math.sin(t * 0.03 + i * 2.5) * (20 + p * 80);
      ctx.fillStyle = [red, cyan, mag, '#fff'][i % 4];
      ctx.globalAlpha = 0.08 + p * 0.2;
      ctx.fillRect(tearShift + shakeX, tearY + shakeY, 1920, tearH);
    }
    ctx.globalAlpha = 1;

    // Flicker: brief white/red frames
    if (p > 0.4 && Math.sin(t * 0.4) > 0.7) {
      ctx.fillStyle = Math.random() > 0.5 ? '#fff' : red;
      ctx.globalAlpha = 0.2 + p * 0.3;
      ctx.fillRect(0, 0, 1920, 1080);
      ctx.globalAlpha = 1;
    }

    // End of beat 2: brief blackout
    if (p > 0.9) {
      ctx.fillStyle = bg;
      ctx.globalAlpha = (p - 0.9) / 0.1;
      ctx.fillRect(0, 0, 1920, 1080);
      ctx.globalAlpha = 1;
    }
  }

  // ── Calm 2 — darker, more static, tension building ──
  if (t >= B2[1] && t < B3[0]) {
    // More prominent scan lines
    for (let y = 0; y < 1080; y += 4) {
      if (Math.random() > 0.85) {
        ctx.fillStyle = Math.random() > 0.5 ? red : org;
        ctx.globalAlpha = 0.06;
        ctx.fillRect((Math.random() - 0.5) * 10, y, 1920, 2);
      }
    }
    ctx.globalAlpha = 1;
  }

  // ════════════════════════════════════════
  // BEAT 3 — maximum chaos → slam to black
  // ════════════════════════════════════════
  if (inBeat(t, B3)) {
    const p = beatProgress(t, B3);

    // Heavy screen shake
    const shakeX = Math.sin(t * 0.25) * (10 + p * 40);
    const shakeY = Math.cos(t * 0.2)  * (5 + p * 20);

    // Massive RGB split — red vs cyan + magenta bleed
    const split = 15 + p * 60;
    ctx.fillStyle = red;
    ctx.globalAlpha = 0.15 + p * 0.25;
    ctx.fillRect(-split + shakeX, shakeY, 1920, 1080);
    ctx.fillStyle = cyan;
    ctx.globalAlpha = 0.12 + p * 0.2;
    ctx.fillRect(split + shakeX, -shakeY, 1920, 1080);
    ctx.fillStyle = mag;
    ctx.globalAlpha = 0.06 + p * 0.1;
    ctx.fillRect(shakeX, split + shakeY, 1920, 1080);
    ctx.globalAlpha = 1;

    // Dense horizontal tears
    const tearCount = 8 + Math.floor(p * 15);
    for (let i = 0; i < tearCount; i++) {
      const tearY = (i / tearCount) * 1080;
      const tearH = 5 + p * 35 + Math.random() * 20;
      const tearShift = Math.sin(t * 0.05 + i * 1.8) * (30 + p * 120);
      ctx.fillStyle = ['#fff', red, cyan, mag][i % 4];
      ctx.globalAlpha = 0.06 + p * 0.22;
      ctx.fillRect(tearShift + shakeX, tearY + shakeY, 1920, tearH);
    }
    ctx.globalAlpha = 1;

    // Block corruption
    if (p > 0.3) {
      const blocks = Math.floor((p - 0.3) * 10);
      for (let i = 0; i < blocks; i++) {
        ctx.fillStyle = [red, cyan, mag, bg][Math.floor(Math.random() * 4)];
        ctx.globalAlpha = 0.3 + Math.random() * 0.5;
        ctx.fillRect(
          Math.random() * 1920 + shakeX,
          Math.random() * 1080 + shakeY,
          50 + Math.random() * 300,
          8 + Math.random() * 60
        );
      }
      ctx.globalAlpha = 1;
    }

    // Rapid strobe flicker in last 40%
    if (p > 0.6) {
      const strobeP = (p - 0.6) / 0.4;
      // Alternate: white → black → red → black rapidly
      const frame = Math.floor(t / 30) % 4;
      if (frame === 0)      { ctx.fillStyle = cyan;   ctx.globalAlpha = strobeP * 0.5; }
      else if (frame === 2) { ctx.fillStyle = mag;    ctx.globalAlpha = strobeP * 0.6; }
      else                  { ctx.fillStyle = bg;     ctx.globalAlpha = strobeP * 0.4; }
      ctx.fillRect(0, 0, 1920, 1080);
      ctx.globalAlpha = 1;
    }

    // SLAM: last 10% goes hard to black
    if (p > 0.88) {
      const slam = (p - 0.88) / 0.12;
      // One final white flash
      if (slam < 0.3) {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = (1 - slam / 0.3) * 0.7;
        ctx.fillRect(0, 0, 1920, 1080);
      }
      // Black closing
      ctx.fillStyle = bg;
      ctx.globalAlpha = slam;
      ctx.fillRect(0, 0, 1920, 1080);
      ctx.globalAlpha = 1;
    }
  }
}

// ─── Export ─────────────────────────────────────────
function startExport() {
  ui.querySelector('button').disabled = true;
  sts.textContent = 'RECORDING...';
  ui.classList.add('hidden');

  const stream   = cvs.captureStream(60);
  const recorder = new MediaRecorder(stream, {
    mimeType: 'video/webm;codecs=vp9',
    videoBitsPerSecond: 12000000,
  });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'sasi-stinger-glitch.webm';
    a.click();
    ui.classList.remove('hidden');
    ui.querySelector('button').disabled = false;
    sts.textContent = 'DONE! OBS Stinger → Transition Point: ' + TP + ' ms';
  };

  recorder.start();
  const t0 = performance.now();
  function tick(now) {
    const t = now - t0;
    if (t > TOTAL + 150) { recorder.stop(); return; }
    drawFrame(Math.min(t, TOTAL));
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

drawFrame(0);
</script>
</body>
</html>
