<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../lib/theme-tokens.css">
<link rel="stylesheet" href="../lib/scene-base.css">
<script src="../lib/config.js"></script>
<script src="../lib/secrets.js"></script>
<script src="../lib/alerts.js"></script>
<script src="../lib/live-update.js"></script>
<title>Sasi Streams — Stream Ending</title>
<style>
/* ================================================
   SASI STREAMS — STREAM ENDING  |  1920x1080
   Layout: brand top-left | offline badge top-right
           text centered | alert bottom-right | ticker bottom
   ================================================ */







.stage { position:absolute; inset:0; z-index:10; animation:fadeIn 1.5s ease forwards; }


/* ================================================
   BRAND — top-left
   ================================================ */
.brand-wrap {
  position:absolute; top:30px; left:52px;
  display:flex; align-items:center; gap:12px;
  opacity:0; animation:tlIn .7s ease .2s forwards;
}

.logo-img {
  width:52px; height:52px; border-radius:10px; display:block;
  background:#fff; padding:9px;
  fill:#FF0000;
  box-sizing:border-box;
}





/* ================================================
   OFFLINE BADGE — top-right
   ================================================ */
.offline-wrap {
  position:absolute; top:30px; right:30px;
  opacity:0; animation:trIn .7s ease .2s forwards;
}

.offline-badge {
  display:flex; align-items:center; gap:9px; padding:8px 14px;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(var(--red-rgb),.32);
  border-radius:8px;
  box-shadow:0 0 16px rgba(var(--red-rgb),.07), inset 0 0 10px rgba(0,0,0,.3);
  position:relative;
}
.offline-badge::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--red-rgb),.5),transparent);
}
.offline-icon {
  width:18px; height:18px; flex-shrink:0;
  stroke:var(--red); stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
  fill:none; opacity:.85;
}
.offline-text { font-size:12px; font-weight:900; letter-spacing:4px; color:var(--red); }

/* ================================================
   MAIN TEXT — centered
   ================================================ */
.text-block {
  position:absolute; left:50%; top:46%; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; text-align:center;
}

/* "Thanks for" — shimmer sweep effect */
.t-thanks {
  font-size:60px; font-weight:900; font-style:italic;
  letter-spacing:6px; color:var(--orange);
  text-shadow:0 0 1px rgba(255,255,255,.9), 0 0 3px var(--orange);
  opacity:0; line-height:1;
  animation:slideUp .7s ease .3s forwards;
  position:relative;
  overflow:hidden;
  display:inline-block;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Shimmer sweep — glowing highlight that slides across */
.t-thanks::after {
  content:'';
  position:absolute; top:0; left:-60%; width:40%; height:100%;
  background:linear-gradient(
    105deg,
    transparent 0%,
    rgba(255,255,255,.08) 35%,
    rgba(255,255,255,.25) 50%,
    rgba(255,255,255,.08) 65%,
    transparent 100%
  );
  animation:thanksShimmer 5s ease-in-out 2s infinite;
}
@keyframes thanksShimmer {
  0%,75%  { left:-60%; opacity:0; }
  78%     { opacity:1; }
  100%    { left:120%; opacity:0; }
}

/* WATCHING — letters get individual wave hover */
.t-watching {
  font-size:200px; font-weight:900; letter-spacing:-10px; line-height:.82;
  display:flex; justify-content:center;
  opacity:0; animation:bigIn .9s cubic-bezier(.22,1,.36,1) .45s forwards;
}


.t-watching .wl {
  display:inline-block;
  color:#fff;
  transition:transform .35s cubic-bezier(.22,1,.36,1),
             color .3s ease,
             text-shadow .3s ease,
             filter .3s ease;
  cursor:default;
}
.t-watching .wl.pop {
  transform:translateY(-14px) scale(1.08);
  color:var(--red);
  text-shadow:0 0 30px var(--red), 0 0 60px var(--orange);
  filter:brightness(1.4);
}

.t-seeyou {
  font-size:52px; font-weight:700; letter-spacing:20px;
  color:var(--red); margin-top:4px;
  text-shadow:0 0 18px rgba(var(--red-rgb),.5);
  opacity:0; animation:slideUp .7s ease .7s forwards;
  cursor:default; display:inline-block;
  transition:letter-spacing .4s ease, text-shadow .4s ease, color .3s;
}
.t-seeyou:hover {
  letter-spacing:28px; color:#fff;
  text-shadow:0 0 30px rgba(var(--red-rgb),.9), 0 0 60px rgba(var(--orange-rgb),.4);
}

.bar {
  width:0; height:3px; margin-top:22px;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--orange));
  border-radius:2px; box-shadow:0 0 14px var(--gold);
  animation:barG .9s ease-out .9s forwards;
}
@keyframes barG{from{width:0}to{width:520px}}

/* ================================================
   ALERT ZONE — bottom-left, above ticker
   ================================================ */
.alert-panel {
  position:absolute;
  left:52px; bottom:72px;
  width:520px;
  z-index:20;
  opacity:0; animation:fadeIn .6s ease 1.4s forwards;
}
.alert-frame {
  width:520px; height:130px;
  border:none;
  border-radius:10px;
  background:transparent;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  position:relative;
}
.alert-frame.sasi-has-alert .alert-label,
.alert-frame.sasi-has-alert .alert-sub { display:none; }
.alert-label {
  font-size:8px; font-weight:900; letter-spacing:5px;
  color:rgba(var(--orange-rgb),.35); text-transform:uppercase;
}
.alert-sub {
  font-size:7px; font-weight:700; letter-spacing:3px;
  color:rgba(255,255,255,.18); text-transform:uppercase;
}

/* ================================================
   BOTTOM TICKER
   ================================================ */
.ticker-wrap {
  position:absolute; bottom:0; left:0; right:0;
  height:58px;
  background:rgba(0,0,0,.8);
  border-top:1px solid rgba(var(--red-rgb),.22);
  display:flex; flex-direction:column; align-items:stretch;
  opacity:0; animation:fadeIn .6s ease 1.8s forwards;
  z-index:15;
}
.ticker-row {
  height:38px; overflow:hidden;
  display:flex; align-items:center;
  background:rgba(0,0,0,.75);
}
.ticker-track {
  display:flex; align-items:center;
  animation:tickerScroll 28s linear infinite;
  white-space:nowrap; gap:0;
}
@keyframes tickerScroll {
  from { transform:translateX(0); }
  to   { transform:translateX(-50%); }
}
.ticker-item {
  display:inline-flex; align-items:center; gap:10px;
  padding:0 40px;
  font-size:13px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,.55);
}
.ticker-item .t-icon   { width:12px; height:12px; fill:var(--red); opacity:.7; flex-shrink:0; }
.ticker-item .t-handle { color:rgba(255,255,255,.8); }
.ticker-dot {
  width:4px; height:4px; border-radius:50%;
  background:rgba(var(--red-rgb),.5); flex-shrink:0;
}
</style>
</head>
<body>


<div class="stage">

  <!-- Brand — top-left -->
  <div class="brand-wrap">
    <svg class="logo-img" viewBox="0 0 24 24"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
    <div class="brand-rule"></div>
    <div class="brand-text">
      <span class="brand-l1" id="brand-l1"></span>
      <span class="brand-l2" id="brand-l2"></span>
    </div>
  </div>

  <!-- Offline badge — top-right -->
  <div class="offline-wrap">
    <div class="offline-badge">
      <svg class="offline-icon" viewBox="0 0 24 24">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" opacity=".5"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" opacity=".5"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" opacity=".3"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" opacity=".3"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="var(--red)" stroke="none"/>
      </svg>
      <span class="offline-text" id="offline-text"></span>
    </div>
  </div>

  <!-- Main text — centered -->
  <div class="text-block">
    <div class="t-thanks" id="t-thanks"></div>
    <div class="t-watching" id="t-watching"></div>
    <div class="t-seeyou" id="t-seeyou"></div>
    <div class="bar"></div>
  </div>

  <!-- Alert zone — bottom-left above ticker -->
  <div class="alert-panel">
    <div class="alert-frame">
      <span class="alert-label">Alert Zone</span>
      <span class="alert-sub">Waiting for alerts</span>
    </div>
  </div>

</div><!-- /stage -->

<!-- Bottom ticker — outside .stage -->
<div class="ticker-wrap">
  <div class="ticker-row">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
</div>

<script>
// Config loaded from config.js (SASI_CONFIG)

// ---- Apply brand + text from config ----
document.getElementById('brand-l1').textContent    = SASI_CONFIG.brand.name;
document.getElementById('brand-l2').textContent    = SASI_CONFIG.ending.tagline;
document.getElementById('offline-text').textContent = SASI_CONFIG.ending.badge;
document.getElementById('t-thanks').textContent    = SASI_CONFIG.ending.thanks;
// Split WATCHING into individual letter spans for wave effect
const watchingEl = document.getElementById('t-watching');
const watchingText = SASI_CONFIG.ending.main;
watchingEl.innerHTML = watchingText.split('').map(
  (ch, i) => `<span class="wl" data-i="${i}">${ch}</span>`
).join('');

// Wave hover — each letter pops in sequence, then pauses, then repeats
const letters = watchingEl.querySelectorAll('.wl');
function runWave() {
  letters.forEach((el, i) => {
    // Stagger: each letter pops 90ms after the previous
    setTimeout(() => {
      el.classList.add('pop');
      // Remove pop after 400ms so it falls back
      setTimeout(() => el.classList.remove('pop'), 400);
    }, i * 90);
  });
}
// First wave after initial animation settles (bigIn = .45s + .9s = ~1.35s)
setTimeout(runWave, 2000);
// Then repeat every 6s (wave takes ~letters*90ms + 400ms ≈ 1.1s, then 4.9s pause)
setInterval(runWave, 6000);
document.getElementById('t-seeyou').textContent    = SASI_CONFIG.ending.sub;


// ---- Bottom ticker ----
const TICKER_ICONS = {
  twitch:   `<svg class="t-icon" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`,
  youtube:  `<svg class="t-icon" viewBox="0 0 24 24"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`,
  instagram:`<svg class="t-icon" viewBox="0 0 24 24"><path d="M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12c0 3.259.014 3.668.072 4.948.058 1.278.262 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24c3.259 0 3.668-.014 4.948-.072 1.278-.058 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.635.558-2.913.06-1.28.072-1.689.072-4.948 0-3.259-.014-3.667-.072-4.947-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 2.16c3.203 0 3.585.016 4.85.071 1.17.055 1.805.249 2.227.415.562.217.96.477 1.382.896.419.42.679.819.896 1.381.164.422.36 1.057.413 2.227.057 1.266.07 1.646.07 4.85s-.015 3.585-.074 4.85c-.061 1.17-.256 1.805-.421 2.227-.224.562-.479.96-.899 1.382-.419.419-.824.679-1.38.896-.42.164-1.065.36-2.235.413-1.274.057-1.649.07-4.859.07-3.211 0-3.586-.015-4.859-.074-1.171-.061-1.816-.256-2.236-.421-.569-.224-.96-.479-1.379-.899-.421-.419-.69-.824-.9-1.38-.165-.42-.359-1.065-.42-2.235-.045-1.26-.061-1.649-.061-4.844 0-3.196.016-3.586.061-4.861.061-1.17.255-1.814.42-2.234.21-.57.479-.96.9-1.381.419-.419.81-.689 1.379-.898.42-.166 1.051-.361 2.221-.421 1.275-.045 1.65-.06 4.859-.06l.045.03zm0 3.678c-3.405 0-6.162 2.76-6.162 6.162 0 3.405 2.76 6.162 6.162 6.162 3.405 0 6.162-2.76 6.162-6.162 0-3.405-2.76-6.162-6.162-6.162zM12 16c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm7.846-10.405c0 .795-.646 1.44-1.44 1.44-.795 0-1.44-.646-1.44-1.44 0-.794.646-1.439 1.44-1.439.793-.001 1.44.645 1.44 1.439z"/></svg>`,
  twitter:  `<svg class="t-icon" viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>`,
};
const PLATFORM_ICON = { TWITCH:'twitch', YOUTUBE:'youtube', INSTAGRAM:'instagram', 'X / TWITTER':'twitter', TWITTER:'twitter' };
const TICKER_TEXT   = { TWITCH:'Follow on Twitch', YOUTUBE:'Subscribe on YouTube', INSTAGRAM:'Follow on Instagram', 'X / TWITTER':'Follow on X', TWITTER:'Follow on X' };
const TICKER_ITEMS  = [
  ...Object.values(SASI_CONFIG.socials).map(s => ({
    icon:   PLATFORM_ICON[s.platform.toUpperCase()] || 'twitch',
    text:   TICKER_TEXT[s.platform.toUpperCase()]   || s.platform,
    handle: s.handle,
  })),
  { icon:'twitch', text: SASI_CONFIG.tickerExtras[2].text, handle: SASI_CONFIG.tickerExtras[2].handle },
];
const track = document.getElementById('ticker-track');
[...TICKER_ITEMS, ...TICKER_ITEMS].forEach((item, i) => {
  const el = document.createElement('span');
  el.className = 'ticker-item';
  el.innerHTML = `${TICKER_ICONS[item.icon]}<span>${item.text}</span><span class="t-handle">${item.handle}</span>`;
  track.appendChild(el);
  if (i < TICKER_ITEMS.length * 2 - 1) {
    const dot = document.createElement('span'); dot.className = 'ticker-dot'; track.appendChild(dot);
  }
});
track.style.animationDuration = SASI_CONFIG.ticker.speed + 's';
if (!SASI_CONFIG.ticker.show.ending) {
  document.querySelector('.ticker-wrap').style.display = 'none';
}

</script>
<script>
// === Live updates from dashboard (sasi-studio v2) ===
if (window.registerLiveUpdater) {
  registerLiveUpdater('end_badge',   liveUpdate.text('#offline-text'));
  registerLiveUpdater('end_tagline', liveUpdate.text('#brand-l2'));
  registerLiveUpdater('end_thanks',  liveUpdate.text('#t-thanks'));
  registerLiveUpdater('end_main',    liveUpdate.text('#t-watching'));
  registerLiveUpdater('end_sub',     liveUpdate.text('#t-seeyou'));
  registerLiveUpdater('end_ticker',  liveUpdate.show('.ticker-wrap'));
  registerLiveUpdater('brand_name',  liveUpdate.text('#brand-l1'));
  registerLiveUpdater('cRed',    liveUpdate.cssVar('--red'));
  registerLiveUpdater('cOrange', liveUpdate.cssVar('--orange'));
  registerLiveUpdater('cGold',   liveUpdate.cssVar('--gold'));
  applyLiveUpdaters();
}
</script>
</body>
</html>
