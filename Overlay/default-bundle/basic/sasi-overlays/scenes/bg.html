<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sasi Streams — Background</title>
<script src="../config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:var(--bg, #050005);
}
canvas { position:absolute; inset:0; }
#c-bg  { z-index:0; }
#c-top { z-index:1; pointer-events:none; }

/* Ambient blobs */
.blob { position:absolute; border-radius:50%; filter:blur(160px); z-index:0; animation:blobF 12s ease-in-out infinite alternate; }
.b1{width:900px;height:900px;background:#5c0000;opacity:.5;top:-200px;left:-200px;animation-delay:0s}
.b2{width:700px;height:700px;background:#3a0000;opacity:.38;bottom:-100px;right:200px;animation-delay:-5s}
.b3{width:400px;height:400px;background:#8b3a00;opacity:.18;top:300px;right:600px;animation-delay:-3s}
@keyframes blobF{from{transform:translate(0,0)scale(1)}to{transform:translate(50px,30px)scale(1.08)}}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<canvas id="c-bg"></canvas>
<canvas id="c-top"></canvas>

<script src="../bg-all.js"></script>
<script>
// Read scene from URL: bg.html?scene=startingSoon
const params = new URLSearchParams(window.location.search);
const scene = params.get('scene') || '';
const rayMap = { startingSoon:'right', brb:'left', ending:'right', justChatting:'right', breakingNews:'right' };
const ray = rayMap[scene] || 'right';

initBg(
  document.getElementById('c-bg'),
  document.getElementById('c-top'),
  { rayOrigin: ray, scene: scene }
);
</script>
</body>
</html>
