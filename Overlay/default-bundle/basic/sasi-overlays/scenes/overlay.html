<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sasi Streams — Stream Overlay</title>
<!-- Global config — edit config.js to change everything -->
<script src="../config.js"></script>
<script src="../secrets.js"></script>
<script src="../alerts.js"></script>
<style>
/* ================================================
   SASI STREAMS — MAIN OVERLAY  |  1920x1080
   OBS Browser Source — transparent background
   ================================================ */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#050005;
  font-family:'Arial Black', Impact, Arial, sans-serif;
  color:#fff;
}

@keyframes fadeIn    { from{opacity:0} to{opacity:1} }
@keyframes tlIn      { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
@keyframes trIn      { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }
@keyframes barIn     { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes topIn     { from{opacity:0;transform:translateX(-50%) translateY(-12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes livePulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--red),0 0 16px rgba(255,34,0,.5)} 50%{opacity:.35;box-shadow:0 0 3px var(--red)} }

/* ================================================
   LIVE BADGE — top-right
   ================================================ */
.live-wrap {
  position:absolute; top:30px; right:30px; z-index:15;
  opacity:0; animation:trIn .7s ease .2s forwards;
}
.live-badge {
  display:flex; align-items:center; gap:8px;
  padding:8px 16px;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,34,0,.35);
  border-radius:8px;
  box-shadow:0 0 18px rgba(255,34,0,.08), inset 0 0 10px rgba(0,0,0,.3);
  position:relative;
}
.live-badge::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,34,0,.5),transparent);
}
.live-dot {
  width:8px; height:8px; border-radius:50%; background:var(--red);
  box-shadow:0 0 8px var(--red),0 0 16px rgba(255,34,0,.5);
  animation:livePulse 1.2s ease-in-out infinite; flex-shrink:0;
}
.live-text { font-size:12px; font-weight:900; letter-spacing:4px; color:var(--red); }

/* ================================================
   SCENE LABEL — top-center, plain text + glitch
   ================================================ */
.scene-wrap {
  position:absolute; top:30px; left:50%; transform:translateX(-50%);
  z-index:20;
  opacity:0; animation:topIn .7s ease .25s forwards;
}
.scene-name {
  font-size:22px; font-weight:900; letter-spacing:6px;
  color:#fff; white-space:nowrap;
  text-align:center;
  text-shadow:0 0 12px rgba(255,255,255,.2);
  /* animation applied by effects.css via config */
  position:relative;
}
@keyframes sceneGlitch {
  0%,38%,100% { opacity:1; transform:skewX(0) translate(0,0); text-shadow:0 0 12px rgba(255,255,255,.2); clip-path:none; filter:none; }
  39%   { opacity:0; }
  39.3% { opacity:1; }
  39.6% { opacity:0; }
  40%   { opacity:1; }
  40.4% { opacity:.15; }
  40.8% { opacity:1; }
  42%   { transform:translate(-5px,0); clip-path:polygon(0 0,100% 0,100% 30%,0 30%); text-shadow:4px 0 var(--red),-3px 0 var(--orange); filter:brightness(1.4); }
  42.3% { transform:translate(4px,0);  clip-path:none; text-shadow:0 0 12px rgba(255,255,255,.2); filter:none; }
  43%   { transform:translate(-3px,1px); clip-path:polygon(0 45%,100% 45%,100% 70%,0 70%); text-shadow:-3px 0 var(--red),5px 0 var(--orange); filter:brightness(1.3); }
  43.4% { transform:translate(2px,-1px); clip-path:polygon(0 20%,100% 20%,100% 50%,0 50%); text-shadow:2px 0 var(--red); filter:none; }
  43.8% { transform:translate(0,0); clip-path:none; text-shadow:0 0 12px rgba(255,255,255,.2); }
  44.5% { transform:skewX(-12deg) translate(-2px,0) scaleX(1.03); text-shadow:3px 0 var(--orange),-3px 0 var(--red); filter:brightness(1.2); }
  44.9% { transform:skewX(0) translate(0,0); text-shadow:0 0 12px rgba(255,255,255,.2); filter:none; }
  71%   { opacity:1; transform:translate(0,0); clip-path:none; }
  71.4% { opacity:0; }
  71.7% { opacity:1; transform:translate(-4px,0); clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%); text-shadow:3px 0 var(--red); }
  72%   { transform:translate(3px,0); clip-path:none; text-shadow:none; }
  72.4% { transform:translate(0,0); text-shadow:0 0 12px rgba(255,255,255,.2); }
}

/* ================================================
   BOTTOM BAR — full width
   ================================================ */
.bottom-bar {
  position:absolute; bottom:0; left:0; right:0; height:52px;
  background:linear-gradient(to top, rgba(0,0,0,.82), rgba(0,0,0,.35));
  border-top:1px solid rgba(255,34,0,.18);
  display:flex; align-items:center; justify-content:center;
  z-index:12;
  opacity:0; animation:barIn .8s ease .5s forwards;
}
.social-item     { display:flex; align-items:center; gap:7px; padding:0 22px; }
.social-icon     { width:14px; height:14px; flex-shrink:0; fill:rgba(255,255,255,.5); }
.social-platform { font-size:8px;  font-weight:900; letter-spacing:3px; color:rgba(255,255,255,.38); }
.social-handle   { font-size:10px; font-weight:900; letter-spacing:2px; color:rgba(255,255,255,.75); }
.social-divider  { width:1px; height:22px; background:rgba(255,34,0,.15); flex-shrink:0; }

/* ================================================
   STREAM INFO POPUP — bottom-left, above bottom bar
   Auto-pops every N minutes, shows for ~10s
   ================================================ */
.info-popup {
  position:absolute;
  bottom:74px;
  left:30px;
  width:340px;
  background:rgba(8,0,2,.92);
  border:1px solid rgba(255,34,0,.28);
  border-radius:8px;
  padding:0;
  box-shadow:0 8px 32px rgba(0,0,0,.6), 0 0 20px rgba(255,34,0,.15);
  z-index:18;
  opacity:0;
  transform:translateX(-120%);
  transition:transform .5s cubic-bezier(.22,1,.36,1), opacity .4s ease;
  overflow:hidden;
}
.info-popup::before {
  content:''; position:absolute; top:0; left:8px; right:8px; height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
}
.info-popup.show {
  opacity:1;
  transform:translateX(0);
}
.info-popup-header {
  display:flex; align-items:center; gap:10px;
  padding:9px 14px;
  border-bottom:1px solid rgba(255,34,0,.18);
  background:rgba(0,0,0,.4);
}
.info-popup-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--red);
  box-shadow:0 0 6px var(--red);
  animation:livePulse 1.6s ease-in-out infinite;
}
.info-popup-title {
  font-size:8px; font-weight:900; letter-spacing:5px;
  color:rgba(255,255,255,.45);
  text-transform:uppercase;
}
.info-popup-body {
  position:relative;
  height:90px;
  overflow:hidden;
}
.info-popup-item {
  position:absolute; inset:0;
  padding:14px 18px;
  display:flex; flex-direction:column; justify-content:center; gap:6px;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .4s ease, transform .4s ease;
}
.info-popup-item.active { opacity:1; transform:translateY(0); }
.info-popup-label {
  font-size:9px; font-weight:900; letter-spacing:5px;
  color:var(--orange);
  text-transform:uppercase;
  line-height:1;
}
.info-popup-value {
  font-size:18px; font-weight:900; letter-spacing:3px;
  color:#fff;
  text-shadow:0 0 12px var(--red);
  line-height:1.1;
}
/* Goal bar variant */
.info-popup-goal-nums {
  font-size:14px; font-weight:900;
  font-variant-numeric:tabular-nums;
  color:#fff;
  margin-top:2px;
}
.info-popup-goal-nums .current {
  color:var(--red);
  font-size:16px;
  text-shadow:0 0 10px var(--red);
}
.info-popup-goal-nums .sep    { color:rgba(255,255,255,.3); margin:0 4px; }
.info-popup-goal-nums .target { color:rgba(255,255,255,.5); }
.info-popup-goal-bar {
  width:100%; height:6px;
  background:rgba(255,255,255,.06);
  border-radius:3px;
  overflow:hidden;
  margin-top:4px;
}
.info-popup-goal-fill {
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--orange));
  box-shadow:0 0 8px var(--red);
  width:0;
  transition:width .8s cubic-bezier(.22,1,.36,1);
}

/* ================================================
   ALERT ZONE — bottom-left, above social bar
   ================================================ */
.alert-panel {
  position:absolute;
  left:30px; bottom:66px;
  width:520px;
  z-index:20;
}
.alert-frame {
  width:520px; height:130px;
  border:none;
  border-radius:10px;
  background:transparent;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  position:relative;
}
.alert-frame.sasi-has-alert .alert-label,
.alert-frame.sasi-has-alert .alert-sub { display:none; }
.alert-label {
  font-size:8px; font-weight:900; letter-spacing:5px;
  color:rgba(255,119,0,.35); text-transform:uppercase;
}
.alert-sub {
  font-size:7px; font-weight:700; letter-spacing:3px;
  color:rgba(255,255,255,.18); text-transform:uppercase;
}

/* Progress bar at bottom showing time remaining */
.info-popup-progress {
  position:absolute; bottom:0; left:0; height:1.5px;
  background:linear-gradient(90deg,var(--red),var(--orange));
  width:100%;
  transform-origin:left;
  transform:scaleX(0);
}
.info-popup.show .info-popup-progress {
  animation:popupProgress var(--show-dur) linear forwards;
}
@keyframes popupProgress { from{transform:scaleX(0)} to{transform:scaleX(1)} }
</style>
</head>
<body>

<!-- LIVE badge — top-right -->
<div class="live-wrap">
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-text">LIVE</span>
  </div>
</div>

<!-- Stream Info popup — top-right, auto-pops every N min -->
<div class="info-popup" id="info-popup">
  <div class="info-popup-header">
    <div class="info-popup-dot"></div>
    <span class="info-popup-title">Stream Info</span>
  </div>
  <div class="info-popup-body" id="info-popup-body"></div>
  <div class="info-popup-progress"></div>
</div>

<!-- Alert zone — bottom-left, above social bar -->
<div class="alert-panel">
  <div class="alert-frame">
    <span class="alert-label">Alert Zone</span>
    <span class="alert-sub">Waiting for alerts</span>
  </div>
</div>

<!-- Bottom bar — socials -->
<div class="bottom-bar" id="bottom-bar"></div>

<!-- SVG icon sprites -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

</svg>

<script>
const C   = SASI_CONFIG;
const scenes = C.live.scenes;
let activeIdx = C.live.defaultScene;

// ── Bottom bar ──
const ICON_IDS = { TWITCH:'icon-twitch', YOUTUBE:'icon-youtube', INSTAGRAM:'icon-instagram', 'X / TWITTER':'icon-twitter', TWITTER:'icon-twitter' };
const bar = document.getElementById('bottom-bar');
Object.values(C.socials).forEach((s, i) => {
  if (i > 0) { const d = document.createElement('div'); d.className = 'social-divider'; bar.appendChild(d); }
  const item = document.createElement('div');
  item.className = 'social-item';
  const iconId = ICON_IDS[s.platform.toUpperCase()] || 'icon-twitch';
  item.innerHTML = `<svg class="social-icon"><use href="#${iconId}"/></svg><span class="social-platform">${s.platform}</span><span class="social-handle">${s.handle}</span>`;
  bar.appendChild(item);
});

// ════════════════════════════════════════════════════════════
//  STREAM INFO POPUP — auto-rotates, pops every 2 minutes
// ════════════════════════════════════════════════════════════
(function() {
  const POPUP_INTERVAL = 120 * 1000;  // 2 minutes between pops
  const POPUP_DURATION = 12 * 1000;   // 12 seconds visible per pop
  const ITEM_CYCLE     = 3 * 1000;    // 3 seconds per item while showing

  const cfg = SASI_CONFIG.streamInfo;
  if (!cfg || !cfg.items || !cfg.items.length) return;

  const popup = document.getElementById('info-popup');
  const body  = document.getElementById('info-popup-body');
  popup.style.setProperty('--show-dur', (POPUP_DURATION / 1000) + 's');

  // Build items
  const items = cfg.items.filter(i => i.type !== 'discord-qr'); // skip QR (too big for small popup)
  const elements = items.map(item => {
    const el = document.createElement('div');
    el.className = 'info-popup-item';

    if (item.type === 'text') {
      el.innerHTML =
        '<div class="info-popup-label">' + item.label + '</div>' +
        '<div class="info-popup-value">' + item.value + '</div>';
    } else if (item.type === 'youtube-goal') {
      el.innerHTML =
        '<div class="info-popup-label">' + item.label + '</div>' +
        '<div class="info-popup-goal-nums"><span class="current">—</span><span class="sep">/</span><span class="target">1K</span></div>' +
        '<div class="info-popup-goal-bar"><div class="info-popup-goal-fill"></div></div>';
    } else if (item.type === 'social') {
      const social = SASI_CONFIG.socials[item.platform];
      if (social) {
        el.innerHTML =
          '<div class="info-popup-label">' + item.label + ' ' + social.platform + '</div>' +
          '<div class="info-popup-value">' + social.handle + '</div>';
      }
    } else if (item.type === 'stream-time') {
      el.innerHTML =
        '<div class="info-popup-label">' + item.label + '</div>' +
        '<div class="info-popup-value" data-stream-time="1">00:00:00</div>';
    }

    body.appendChild(el);
    return el;
  });

  // ── YouTube subs fetch + milestone-based goal updates ──
  const MILESTONES = [1000, 10000, 50000, 100000, 500000, 1000000];
  function nextMilestone(current) {
    for (const m of MILESTONES) if (current < m) return m;
    return null;
  }
  function formatNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
    if (n >= 1000)    return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K';
    return n.toLocaleString('en-IN');
  }

  let cachedSubs = null;
  function updateGoalDisplays() {
    elements.forEach((el, i) => {
      if (items[i].type !== 'youtube-goal') return;
      const currentEl = el.querySelector('.current');
      const targetEl  = el.querySelector('.target');
      const fillEl    = el.querySelector('.info-popup-goal-fill');
      if (!currentEl || !targetEl || !fillEl) return;

      if (cachedSubs == null) {
        currentEl.textContent = '—';
        targetEl.textContent  = '1K';
        fillEl.style.width    = '0%';
        return;
      }
      const target = nextMilestone(cachedSubs);
      if (target == null) {
        currentEl.textContent = formatNum(cachedSubs);
        targetEl.textContent  = '1M+';
        fillEl.style.width    = '100%';
        return;
      }
      const prevIdx = MILESTONES.indexOf(target) - 1;
      const floor   = prevIdx >= 0 ? MILESTONES[prevIdx] : 0;
      const span    = target - floor;
      const pct = Math.min(100, Math.round(((cachedSubs - floor) / span) * 100));
      currentEl.textContent = formatNum(cachedSubs);
      targetEl.textContent  = formatNum(target);
      fillEl.style.width    = pct + '%';
    });
  }

  async function fetchYouTubeSubs() {
    const yt = window.SASI_SECRETS && window.SASI_SECRETS.youtube;
    if (!yt || !yt.apiKey || !yt.channelId || yt.apiKey.startsWith('YOUR_')) return;
    try {
      const url = 'https://www.googleapis.com/youtube/v3/channels?part=statistics&id=' + yt.channelId + '&key=' + yt.apiKey;
      const res = await fetch(url);
      const data = await res.json();
      if (data.items && data.items[0] && data.items[0].statistics) {
        cachedSubs = parseInt(data.items[0].statistics.subscriberCount, 10);
        updateGoalDisplays();
      }
    } catch(e) { console.warn('YT fetch failed:', e); }
  }
  // Fetch immediately and every 60 seconds (within YouTube quota)
  fetchYouTubeSubs();
  setInterval(fetchYouTubeSubs, 60 * 1000);

  // Stream time ticker (if any)
  const streamStart = Date.now();
  const timeEls = body.querySelectorAll('[data-stream-time]');
  if (timeEls.length) {
    function tick() {
      const elapsed = Math.floor((Date.now() - streamStart) / 1000);
      const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
      const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      timeEls.forEach(el => el.textContent = h + ':' + m + ':' + s);
    }
    tick();
    setInterval(tick, 1000);
  }

  // ── Show popup, cycle through items, hide ──
  let cycleTimer = null;
  function showPopup() {
    if (!elements.length) return;
    popup.classList.add('show');

    let idx = 0;
    function showItem(i) {
      elements.forEach((el, k) => el.classList.toggle('active', k === i));
    }
    showItem(0);

    cycleTimer = setInterval(() => {
      idx = (idx + 1) % elements.length;
      showItem(idx);
    }, ITEM_CYCLE);

    // Hide after duration
    setTimeout(() => {
      clearInterval(cycleTimer);
      popup.classList.remove('show');
      elements.forEach(el => el.classList.remove('active'));
    }, POPUP_DURATION);
  }

  // First pop after 30 seconds, then every 2 minutes
  setTimeout(showPopup, 30 * 1000);
  setInterval(showPopup, POPUP_INTERVAL);
})();
</script>
</body>
</html>
