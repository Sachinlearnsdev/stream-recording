<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sasi Streams — Scene Transition</title>
<script src="../config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:transparent;
  font-family:'Arial Black', Impact, Arial, sans-serif;
}

/* ─────────── TOP HALF ─────────── */
.top-half {
  position:absolute; top:0; left:0; right:0;
  height:50%;
  background:linear-gradient(to bottom, var(--bg, #050005) 0%, rgba(8,0,2,.95) 100%);
  border-bottom:2px solid var(--red, #FF2200);
  box-shadow:0 8px 32px rgba(255,34,0,.3), 0 0 0 1px rgba(255,34,0,.2);
  transform:translateY(-100%);
  animation:topPullDown .55s cubic-bezier(.85,0,.15,1) forwards,
            topPullUp .55s cubic-bezier(.85,0,.15,1) 1.6s forwards;
}
.top-half::after {
  content:'';
  position:absolute; bottom:-1px; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--red, #FF2200), transparent);
  box-shadow:0 0 12px var(--red, #FF2200);
}

/* ─────────── BOTTOM HALF ─────────── */
.bot-half {
  position:absolute; bottom:0; left:0; right:0;
  height:50%;
  background:linear-gradient(to top, var(--bg, #050005) 0%, rgba(8,0,2,.95) 100%);
  border-top:2px solid var(--red, #FF2200);
  box-shadow:0 -8px 32px rgba(255,34,0,.3), 0 0 0 1px rgba(255,34,0,.2);
  transform:translateY(100%);
  animation:botPullUp .55s cubic-bezier(.85,0,.15,1) forwards,
            botPullDown .55s cubic-bezier(.85,0,.15,1) 1.6s forwards;
}
.bot-half::before {
  content:'';
  position:absolute; top:-1px; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--red, #FF2200), transparent);
  box-shadow:0 0 12px var(--red, #FF2200);
}

@keyframes topPullDown { from { transform:translateY(-100%); } to { transform:translateY(0); } }
@keyframes topPullUp   { from { transform:translateY(0); }    to { transform:translateY(-100%); } }
@keyframes botPullUp   { from { transform:translateY(100%); }  to { transform:translateY(0); } }
@keyframes botPullDown { from { transform:translateY(0); }    to { transform:translateY(100%); } }

/* ─────────── CENTER LOGO + TEXT ─────────── */
.center {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%, -50%);
  display:flex; flex-direction:column; align-items:center; gap:18px;
  opacity:0;
  animation:centerIn .5s ease .55s forwards,
            centerOut .4s ease 1.55s forwards;
  z-index:10;
}
.center img {
  width:84px; height:84px;
  border-radius:14px;
  box-shadow:0 0 30px rgba(255,34,0,.5);
}
.center .brand {
  font-size:24px; font-weight:900; letter-spacing:8px;
  color:#fff;
  text-shadow:0 0 20px rgba(255,34,0,.6);
}
.center .tagline {
  font-size:10px; font-weight:700; letter-spacing:6px;
  color:rgba(255,119,0,.7);
  text-transform:uppercase;
}

@keyframes centerIn  { from { opacity:0; transform:translate(-50%,-50%) scale(.85); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }
@keyframes centerOut { from { opacity:1; transform:translate(-50%,-50%) scale(1); }   to { opacity:0; transform:translate(-50%,-50%) scale(1.1); } }

/* ─────────── SCAN LINE EFFECT ─────────── */
.scan {
  position:absolute; left:0; right:0;
  top:50%; height:3px;
  background:linear-gradient(90deg, transparent, var(--gold, #FFD700), transparent);
  box-shadow:0 0 16px var(--gold, #FFD700), 0 0 32px rgba(255,215,0,.5);
  opacity:0;
  animation:scanIn .3s ease .55s forwards,
            scanGrow .9s ease .85s forwards,
            scanOut .3s ease 1.55s forwards;
  z-index:5;
}
@keyframes scanIn   { from { opacity:0; transform:scaleX(0); } to { opacity:1; transform:scaleX(1); } }
@keyframes scanGrow { from { height:3px; } to { height:6px; } }
@keyframes scanOut  { from { opacity:1; } to { opacity:0; } }

/* ─────────── CORNER ACCENTS ─────────── */
.corner {
  position:absolute;
  width:60px; height:60px;
  opacity:0;
  animation:cornerIn .4s ease .65s forwards,
            cornerOut .3s ease 1.55s forwards;
}
.corner.tl { top:30px; left:30px; }
.corner.tr { top:30px; right:30px; transform:scaleX(-1); }
.corner.bl { bottom:30px; left:30px; transform:scaleY(-1); }
.corner.br { bottom:30px; right:30px; transform:scale(-1); }

.corner::before, .corner::after {
  content:''; position:absolute;
  background:var(--orange, #FF7700);
  box-shadow:0 0 8px var(--orange, #FF7700);
}
.corner::before { top:0; left:0; width:30px; height:2px; }
.corner::after { top:0; left:0; width:2px; height:30px; }

@keyframes cornerIn  { from { opacity:0; } to { opacity:1; } }
@keyframes cornerOut { from { opacity:1; } to { opacity:0; } }
</style>
</head>
<body>

<div class="top-half"></div>
<div class="bot-half"></div>
<div class="scan"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="center">
  <img src="../assets/Sasi_Streams_logo.png" alt="">
  <div class="brand" id="brand-name">SASI STREAMS</div>
  <div class="tagline" id="brand-tag">LIVE IN PROGRESS</div>
</div>

<script>
document.getElementById('brand-name').textContent = SASI_CONFIG.brand.name;
document.getElementById('brand-tag').textContent = SASI_CONFIG.brand.tagline || 'LIVE IN PROGRESS';

// Total duration: ~2.2 seconds
// 0.0s — top + bottom pull in
// 0.55s — meet, logo + scan line appears
// 1.55s — logo fades out
// 1.6s — top + bottom pull out
// 2.15s — fully gone
</script>
</body>
</html>
