<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sasi Streams — Likes Strip</title>
<script src="../config.js"></script>
<style>
:root { --red:#FF2200; --orange:#FF7700; --gold:#FFD700; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:transparent;
  font-family:'Inter','Helvetica Neue',Arial,sans-serif;
  color:#fff;
}

.strip {
  position:absolute;
  bottom:110px; left:0; right:0;
  height:64px;
  background:
    linear-gradient(180deg, rgba(8,0,2,.82) 0%, rgba(4,0,1,.92) 50%, rgba(8,0,2,.82) 100%);
  display:flex; align-items:center;
  overflow:hidden;
  opacity:0; animation:stripIn .6s ease forwards;
}
@keyframes stripIn { to { opacity:1; } }

.strip::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,34,0,.55) 12%, rgba(255,34,0,.55) 88%, transparent);
}
.strip::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,34,0,.35) 12%, rgba(255,34,0,.35) 88%, transparent);
}

.strip-mask {
  position:absolute; inset:0;
  background:linear-gradient(90deg, rgba(5,0,5,1) 0%, transparent 5%, transparent 95%, rgba(5,0,5,1) 100%);
  pointer-events:none; z-index:5;
}

.track {
  display:flex; align-items:center;
  flex-shrink:0;
  white-space:nowrap;
  will-change:transform;
  animation:scrollLR 20s linear infinite;
}
@keyframes scrollLR {
  from { transform:translateX(-50%); }
  to   { transform:translateX(0); }
}

.item {
  display:inline-flex; align-items:center; gap:10px;
  padding:0 22px;
}
.item-icon {
  display:flex; align-items:center; justify-content:center;
  width:24px; height:24px;
  flex-shrink:0;
}
.item-icon svg {
  width:100%; height:100%;
  fill:#fff;
}
.item-text {
  font-size:26px;
  font-weight:900;
  font-style:italic;
  letter-spacing:.5px;
  color:var(--red);
  text-shadow:0 0 12px rgba(255,34,0,.4);
  white-space:nowrap;
}
</style>
</head>
<body>

<div class="strip">
  <div class="track" id="track"></div>
  <div class="strip-mask"></div>
</div>

<script>
// Thumbs up icon
const THUMB_SVG = '<svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.01-.01L23 10z"/></svg>';

const TEXT = (window.SASI_CONFIG && SASI_CONFIG.likes && SASI_CONFIG.likes.tickerItems && SASI_CONFIG.likes.tickerItems[0]) || 'LIKE';

const REPEAT = 18;
const html = Array.from({length: REPEAT}, () =>
  `<div class="item"><div class="item-icon">${THUMB_SVG}</div><div class="item-text">${TEXT}</div></div>`
).join('');

document.getElementById('track').innerHTML = html + html;
</script>

</body>
</html>
