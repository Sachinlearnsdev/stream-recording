<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Likes — Variant B: Counter Pop</title>
<style>
:root { --red:#FF2200; --orange:#FF7700; --gold:#FFD700; --bg:#050005; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#050005;
  font-family:'Inter','Segoe UI',Arial,sans-serif;
  color:#fff;
}

/* Small corner counter — lives in the corner permanently, pops when hit */
.counter {
  position:absolute; top:60px; left:60px;
  display:flex; align-items:center; gap:10px;
  padding:10px 16px 10px 12px;
  background:rgba(8,0,2,.92);
  border:1px solid rgba(255,34,0,.32);
  border-radius:100px;
  box-shadow:0 0 20px rgba(255,34,0,.1), inset 0 0 12px rgba(0,0,0,.3);
  position:relative;
}
.counter::before {
  content:''; position:absolute; top:0; left:14px; right:14px; height:1px;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
}

.heart {
  width:24px; height:24px;
  transform-origin:center;
}
.heart svg {
  width:100%; height:100%; fill:var(--red);
  filter:drop-shadow(0 0 8px rgba(255,34,0,.6));
}

.counter.pop .heart {
  animation:beat .45s cubic-bezier(.2,1.4,.3,1);
}
@keyframes beat {
  0%   { transform:scale(1); }
  30%  { transform:scale(1.55); }
  60%  { transform:scale(.88); }
  100% { transform:scale(1); }
}

.count {
  font-size:22px; font-weight:900; letter-spacing:.5px;
  color:#fff;
  font-variant-numeric:tabular-nums;
  min-width:56px;
}

.label {
  font-size:9px; font-weight:900; letter-spacing:3px;
  color:var(--orange); text-transform:uppercase;
  border-left:1px solid rgba(255,34,0,.25);
  padding-left:10px;
}

/* Floating +1 ping that flies up when count changes */
.ping {
  position:absolute;
  left:28px; top:18px;
  font-size:14px; font-weight:900;
  color:var(--gold);
  text-shadow:0 0 8px rgba(255,215,0,.6);
  opacity:0; pointer-events:none;
}
.ping.go {
  animation:pingUp 1.1s ease-out forwards;
}
@keyframes pingUp {
  0%   { opacity:0; transform:translateY(0) scale(.6); }
  20%  { opacity:1; transform:translateY(-6px) scale(1); }
  100% { opacity:0; transform:translateY(-44px) scale(1); }
}
</style>
</head>
<body>

<div class="counter" id="counter">
  <div class="heart">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
  </div>
  <div class="count" id="count">1,248</div>
  <div class="label">Likes</div>
</div>

<script>
const counter = document.getElementById('counter');
const countEl = document.getElementById('count');
let n = 1248;

function hit() {
  // How many to add this tick (simulate variable traffic)
  const add = 1 + Math.floor(Math.random() * 3);
  n += add;
  countEl.textContent = n.toLocaleString('en-IN');

  counter.classList.remove('pop');
  void counter.offsetWidth;  // reflow
  counter.classList.add('pop');

  // Spawn the +N ping
  const ping = document.createElement('div');
  ping.className = 'ping';
  ping.textContent = '+' + add;
  counter.appendChild(ping);
  requestAnimationFrame(() => ping.classList.add('go'));
  setTimeout(() => ping.remove(), 1200);
}

// Tick every 600-1500ms
function loop() {
  hit();
  setTimeout(loop, 600 + Math.random() * 900);
}
loop();
</script>

</body>
</html>
