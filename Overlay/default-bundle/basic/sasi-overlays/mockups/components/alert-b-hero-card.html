<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alert — Variant B: Hero Card</title>
<style>
:root { --red:#FF2200; --orange:#FF7700; --gold:#FFD700; --bg:#050005; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#050005;
  font-family:'Inter','Segoe UI',Arial,sans-serif;
  color:#fff;
}

.stage {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:560px; height:240px;
  border:1px dashed rgba(255,255,255,.08);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
}
.stage-label {
  position:absolute; top:10px; left:14px;
  font-size:9px; font-weight:900; letter-spacing:4px;
  color:rgba(255,255,255,.15); text-transform:uppercase;
}

.hero {
  width:520px;
  background:linear-gradient(180deg, rgba(20,0,4,.96), rgba(8,0,2,.96));
  border:1px solid rgba(255,34,0,.35);
  border-radius:12px;
  padding:22px 26px 20px;
  box-shadow:0 18px 60px rgba(255,34,0,.25), inset 0 0 40px rgba(0,0,0,.4);
  position:relative; overflow:hidden;
}
/* Brand gradient top line */
.hero::before {
  content:''; position:absolute; top:0; left:14px; right:14px; height:1px;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
  box-shadow:0 0 12px var(--red);
}
/* Corner ticks */
.hero::after {
  content:''; position:absolute; top:0; right:0;
  width:18px; height:2px;
  background:var(--red); box-shadow:0 0 8px var(--red);
}
.tick-tr-v { position:absolute; top:0; right:0; width:2px; height:18px; background:var(--red); box-shadow:0 0 8px var(--red); }
.tick-bl-h { position:absolute; bottom:0; left:0; width:18px; height:2px; background:var(--orange); box-shadow:0 0 6px var(--orange); }
.tick-bl-v { position:absolute; bottom:0; left:0; width:2px; height:18px; background:var(--orange); box-shadow:0 0 6px var(--orange); }

.head { display:flex; align-items:center; gap:18px; }
.icon {
  width:64px; height:64px; border-radius:14px;
  background:linear-gradient(135deg, var(--red), var(--orange));
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 30px rgba(255,34,0,.55), inset 0 -2px 8px rgba(0,0,0,.25);
  opacity:0; transform:scale(.6) rotate(-12deg);
  animation:iconIn .6s cubic-bezier(.2,1,.3,1.15) .15s forwards;
}
@keyframes iconIn {
  from { opacity:0; transform:scale(.6) rotate(-12deg); }
  to   { opacity:1; transform:scale(1) rotate(0); }
}
.icon svg { width:32px; height:32px; fill:#fff; }

.copy { display:flex; flex-direction:column; gap:4px; flex:1; min-width:0; }
.label {
  font-size:11px; font-weight:900; letter-spacing:5px;
  color:var(--orange); text-transform:uppercase;
  text-shadow:0 0 10px rgba(255,119,0,.35);
  opacity:0; transform:translateY(6px);
  animation:lineIn .5s ease .35s forwards;
}
.name {
  font-size:28px; font-weight:900; color:#fff;
  letter-spacing:.3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-shadow:0 0 18px rgba(255,34,0,.4);
  opacity:0; transform:translateY(6px);
  animation:lineIn .5s ease .45s forwards;
}
@keyframes lineIn { to { opacity:1; transform:translateY(0); } }

.message {
  margin-top:14px;
  font-size:14px; font-weight:500; line-height:1.45;
  color:rgba(255,255,255,.82);
  padding:12px 14px;
  background:rgba(255,34,0,.05);
  border-left:2px solid var(--red);
  border-radius:4px;
  /* Clamp long messages to 3 lines with ellipsis — keeps the popup a predictable size */
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-wrap:break-word;
  opacity:0; animation:msgIn .5s ease .65s forwards;
}
@keyframes msgIn { to { opacity:1; } }

.hero-progress {
  position:absolute; bottom:0; left:0; right:0; height:2px;
  background:rgba(255,255,255,.06);
}
.hero-progress::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, var(--red), var(--orange), var(--gold));
  transform-origin:left;
  animation:fill 5s linear .8s forwards;
}
@keyframes fill { to { transform:scaleX(0); } }

.hero {
  opacity:0; transform:translateY(20px) scale(.96);
  animation:heroIn .5s cubic-bezier(.2,.9,.3,1.05) forwards,
             heroOut .45s ease 6s forwards;
}
@keyframes heroIn {
  to { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes heroOut {
  from { opacity:1; transform:translateY(0) scale(1); }
  to   { opacity:0; transform:translateY(-14px) scale(.98); }
}
</style>
</head>
<body>

<div class="stage">
  <span class="stage-label">★ Alert Frame</span>
  <div class="hero" id="hero">
    <span class="tick-tr-v"></span>
    <span class="tick-bl-h"></span>
    <span class="tick-bl-v"></span>
    <div class="head">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <div class="copy">
        <div class="label">New Subscriber</div>
        <div class="name">mikhail</div>
      </div>
    </div>
    <div class="message">Been watching forever, finally pulled the trigger 🔥</div>
    <div class="hero-progress"></div>
  </div>
</div>

<script>
const stage = document.querySelector('.stage');
let node = document.getElementById('hero');
function replay() {
  const clone = node.cloneNode(true);
  node.replaceWith(clone);
  node = clone;
  setTimeout(replay, 6800);
}
setTimeout(replay, 6800);
</script>

</body>
</html>
