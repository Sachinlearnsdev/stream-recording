<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Likes — Variant A: Heart Rain</title>
<style>
:root { --red:#FF2200; --orange:#FF7700; --gold:#FFD700; --bg:#050005; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#050005;
  font-family:'Inter','Segoe UI',Arial,sans-serif;
  color:#fff;
}

/* No bar — hearts rise from bottom across the full width */
.stage {
  position:absolute; inset:0;
  pointer-events:none;
}

.heart {
  position:absolute;
  bottom:-40px;
  opacity:0;
}
.heart svg {
  width:100%; height:100%;
  filter:drop-shadow(0 0 8px rgba(255,34,0,.5));
}
.heart.go {
  animation:rise var(--d,4s) cubic-bezier(.3,.1,.2,1) forwards;
}
@keyframes rise {
  0%   { opacity:0; transform:translateY(0) translateX(0) scale(.4) rotate(0); }
  12%  { opacity:.9; }
  55%  { opacity:.8; transform:translateY(-480px) translateX(var(--drift)) scale(1) rotate(var(--r1)); }
  100% { opacity:0; transform:translateY(-1100px) translateX(var(--drift2)) scale(.7) rotate(var(--r2)); }
}

/* Small text callout at bottom-center */
.callout {
  position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  padding:10px 22px;
  background:rgba(8,0,2,.85);
  border:1px solid rgba(255,34,0,.35);
  border-radius:100px;
  box-shadow:0 0 20px rgba(255,34,0,.2);
  opacity:0;
  animation:calloutIn .5s ease .3s forwards,
             calloutOut .4s ease 5.2s forwards;
}
.callout::before {
  content:''; position:absolute; top:0; left:20%; right:20%; height:1px;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
}
@keyframes calloutIn  { to { opacity:1; } }
@keyframes calloutOut { to { opacity:0; transform:translateX(-50%) translateY(6px); } }

.callout .c-icon {
  width:16px; height:16px;
  animation:beat .5s ease 1s 4;
}
.callout .c-icon svg { width:100%; height:100%; fill:var(--red); filter:drop-shadow(0 0 6px rgba(255,34,0,.7)); }
@keyframes beat { 0%,100%{transform:scale(1)} 40%{transform:scale(1.3)} 70%{transform:scale(.9)} }

.callout .c-text {
  font-size:13px; font-weight:900; letter-spacing:3px;
  color:#fff; text-transform:uppercase;
}
.callout .c-sub {
  font-size:9px; font-weight:700; letter-spacing:2px;
  color:rgba(255,255,255,.45); text-transform:uppercase;
  margin-left:8px;
  border-left:1px solid rgba(255,34,0,.25);
  padding-left:10px;
}
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<div class="callout">
  <span class="c-icon">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
  </span>
  <span class="c-text">Smash that Like</span>
  <span class="c-sub">Show some love</span>
</div>

<script>
const stage = document.getElementById('stage');
const HEART_SVG = '<svg viewBox="0 0 24 24" fill="#FF2200"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
const COLORS = ['#FF2200', '#FF7700', '#FFD700', '#FF4422', '#FF9944'];

function spawn() {
  const h = document.createElement('div');
  h.className = 'heart';
  const size = 18 + Math.random() * 28;
  const x = Math.random() * 1920;
  const drift = (Math.random() - .5) * 120;
  const drift2 = drift + (Math.random() - .5) * 140;
  h.style.width  = size + 'px';
  h.style.height = size + 'px';
  h.style.left   = x + 'px';
  h.style.setProperty('--d', (3 + Math.random() * 2.2) + 's');
  h.style.setProperty('--drift',  drift + 'px');
  h.style.setProperty('--drift2', drift2 + 'px');
  h.style.setProperty('--r1', ((Math.random() - .5) * 60) + 'deg');
  h.style.setProperty('--r2', ((Math.random() - .5) * 120) + 'deg');
  h.innerHTML = HEART_SVG;
  h.querySelector('svg').setAttribute('fill', COLORS[Math.floor(Math.random() * COLORS.length)]);
  stage.appendChild(h);
  requestAnimationFrame(() => h.classList.add('go'));
  setTimeout(() => h.remove(), 6500);
}

// Burst pattern: ~80 hearts over 3.5 seconds
function burst() {
  stage.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    setTimeout(spawn, i * 45 + Math.random() * 60);
  }
}

burst();
setInterval(() => location.reload(), 6800);
</script>

</body>
</html>
