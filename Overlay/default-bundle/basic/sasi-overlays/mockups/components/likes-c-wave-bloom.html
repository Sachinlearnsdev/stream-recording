<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Likes — Variant C: Wave Bloom</title>
<style>
:root { --red:#FF2200; --orange:#FF7700; --gold:#FFD700; --bg:#050005; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#050005;
  font-family:'Inter','Segoe UI',Arial,sans-serif;
  color:#fff;
}

/* Large heart blooms from bottom-center, ripples outward */
.stage {
  position:absolute; bottom:160px; left:50%; transform:translateX(-50%);
  width:420px; height:420px;
  display:flex; align-items:center; justify-content:center;
}

.ripple {
  position:absolute; inset:0;
  border:2px solid var(--red);
  border-radius:50%;
  opacity:0;
  animation:rippleOut 2.4s ease-out infinite;
}
.ripple.r2 { animation-delay:.7s; border-color:var(--orange); }
.ripple.r3 { animation-delay:1.4s; border-color:var(--gold); }
@keyframes rippleOut {
  0%   { opacity:.7; transform:scale(.4); border-width:3px; }
  60%  { opacity:.3; }
  100% { opacity:0; transform:scale(1.6); border-width:1px; }
}

.bloom {
  position:relative; z-index:5;
  width:180px; height:180px;
  opacity:0; transform:scale(.3);
  animation:bloomIn .6s cubic-bezier(.2,1.5,.3,1) .2s forwards,
             beat 1.5s ease-in-out .9s 3,
             bloomOut .5s ease 5.5s forwards;
}
.bloom svg {
  width:100%; height:100%;
  fill:url(#heartGrad);
  filter:drop-shadow(0 0 40px rgba(255,34,0,.65)) drop-shadow(0 0 80px rgba(255,34,0,.35));
}
@keyframes bloomIn  { to { opacity:1; transform:scale(1); } }
@keyframes bloomOut { to { opacity:0; transform:scale(1.25); } }
@keyframes beat {
  0%,100% { transform:scale(1); }
  25%     { transform:scale(1.12); }
  50%     { transform:scale(.96); }
  75%     { transform:scale(1.08); }
}

.label {
  position:absolute; bottom:-60px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:4px;
  white-space:nowrap;
  opacity:0;
  animation:labelIn .5s ease .85s forwards,
             labelOut .4s ease 5.3s forwards;
}
@keyframes labelIn  { to { opacity:1; } }
@keyframes labelOut { to { opacity:0; } }

.label-top {
  font-size:10px; font-weight:900; letter-spacing:5px;
  color:var(--orange); text-transform:uppercase;
}
.label-main {
  font-size:22px; font-weight:900; letter-spacing:4px;
  color:#fff; text-transform:uppercase;
  text-shadow:0 0 14px rgba(255,34,0,.5);
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="heartGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#FF4422"/>
      <stop offset="55%" stop-color="#FF2200"/>
      <stop offset="100%" stop-color="#8a0f00"/>
    </linearGradient>
  </defs>
</svg>

<div class="stage">
  <div class="ripple"></div>
  <div class="ripple r2"></div>
  <div class="ripple r3"></div>
  <div class="bloom">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
  </div>
  <div class="label">
    <span class="label-top">Show Some Love</span>
    <span class="label-main">Smash Like</span>
  </div>
</div>

<script>
setTimeout(() => location.reload(), 6800);
</script>

</body>
</html>
