<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subscribe — Variant B: Corner Notch</title>
<style>
:root { --red:#FF2200; --orange:#FF7700; --gold:#FFD700; --bg:#050005; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#050005;
  font-family:'Inter','Segoe UI',Arial,sans-serif;
  color:#fff;
}

/* Notch sits flush against the top-right corner of the screen */
.notch {
  position:absolute; top:0; right:0;
  background:rgba(8,0,2,.94);
  border-left:1px solid rgba(255,34,0,.4);
  border-bottom:1px solid rgba(255,34,0,.4);
  border-bottom-left-radius:12px;
  padding:18px 26px 18px 22px;
  min-width:320px;
  display:flex; align-items:center; gap:14px;
  box-shadow:-10px 14px 40px rgba(255,34,0,.2), inset 0 0 30px rgba(0,0,0,.4);
  transform:translate(100%, -10%);
  opacity:0;
  animation:notchIn .55s cubic-bezier(.2,.9,.3,1) .15s forwards,
             notchOut .45s ease 5.5s forwards;
}
.notch::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, var(--red), transparent);
}
.notch::after {
  content:''; position:absolute; top:0; left:0; width:2px; height:22px;
  background:var(--red); box-shadow:0 0 8px var(--red);
}
@keyframes notchIn {
  to { transform:translate(0,0); opacity:1; }
}
@keyframes notchOut {
  to { transform:translate(20%, -10%); opacity:0; }
}

.icon {
  width:46px; height:46px; border-radius:12px;
  background:linear-gradient(135deg, var(--red), #8a0f00);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 18px rgba(255,34,0,.5), inset 0 -2px 6px rgba(0,0,0,.3);
  opacity:0; transform:rotate(-8deg) scale(.7);
  animation:iconIn .5s cubic-bezier(.2,1.2,.3,1) .55s forwards,
             bellRing .45s ease 1s 3;
}
.icon svg { width:24px; height:24px; fill:#fff; }
@keyframes iconIn {
  to { opacity:1; transform:rotate(0) scale(1); }
}
@keyframes bellRing {
  0%,100% { transform:rotate(0); }
  25%     { transform:rotate(14deg); }
  50%     { transform:rotate(-12deg); }
  75%     { transform:rotate(6deg); }
}

.text { display:flex; flex-direction:column; gap:2px; }
.label {
  font-size:9px; font-weight:900; letter-spacing:4px;
  color:var(--orange); text-transform:uppercase;
  opacity:0; animation:textIn .4s ease .75s forwards;
}
.main {
  font-size:20px; font-weight:900; letter-spacing:2px;
  color:#fff; text-transform:uppercase;
  text-shadow:0 0 12px rgba(255,34,0,.4);
  opacity:0; animation:textIn .4s ease .88s forwards;
}
.sub {
  font-size:10px; font-weight:600; letter-spacing:1px;
  color:rgba(255,255,255,.4);
  margin-top:2px;
  opacity:0; animation:textIn .4s ease 1s forwards;
}
@keyframes textIn { to { opacity:1; } }

/* Progress bar */
.progress {
  position:absolute; left:0; right:0; bottom:0; height:2px;
  background:linear-gradient(90deg, var(--red), var(--orange));
  transform-origin:right;
  animation:fill 4.5s linear .8s forwards;
}
@keyframes fill { to { transform:scaleX(0); } }
</style>
</head>
<body>

<div class="notch" id="notch">
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4a2 2 0 0 0 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </div>
  <div class="text">
    <div class="label">Don't Miss</div>
    <div class="main">Subscribe</div>
    <div class="sub">Ring the bell for new streams</div>
  </div>
  <div class="progress"></div>
</div>

<script>
function replay() { setTimeout(() => location.reload(), 6500); }
replay();
</script>

</body>
</html>
