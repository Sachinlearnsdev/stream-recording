<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sasi Streams — Stinger Export</title>
<script src="../config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#000;
  font-family:'Arial Black', Impact, Arial, sans-serif;
  display:flex; align-items:center; justify-content:center;
}
canvas { display:block; }
.ui {
  position:absolute; inset:0; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; background:rgba(0,0,0,.95);
}
.ui.hidden { display:none; }
.ui h1 { font-size:28px; color:#fff; letter-spacing:4px; }
.ui p  { font-size:14px; color:rgba(255,255,255,.5); letter-spacing:2px; max-width:600px; text-align:center; line-height:1.6; }
.ui button {
  padding:14px 40px; border:2px solid var(--red, #FF2200); background:transparent;
  color:#fff; font-family:inherit; font-size:14px; font-weight:900;
  letter-spacing:4px; cursor:pointer; border-radius:6px;
  transition:background .2s, box-shadow .2s;
}
.ui button:hover { background:rgba(255,34,0,.15); box-shadow:0 0 20px rgba(255,34,0,.3); }
.ui .status { font-size:12px; color:var(--orange, #FF7700); letter-spacing:3px; max-width:600px; text-align:center; }
</style>
</head>
<body>

<canvas id="c" width="1920" height="1080"></canvas>

<div class="ui" id="ui">
  <h1>STINGER EXPORT</h1>
  <p>Click to record the stinger animation and download as WebM.<br>
     Then use the file in OBS → Stinger transition.</p>
  <button id="btn" onclick="startExport()">RECORD & DOWNLOAD</button>
  <div class="status" id="status"></div>
</div>

<script>
const SC  = SASI_CONFIG;
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const ui  = document.getElementById('ui');
const btn = document.getElementById('btn');
const sts = document.getElementById('status');

// ─── Timing ───────────────────────────────────────
// Phase 1: Bars sweep LEFT → RIGHT, covering the screen   (0 → 900ms)
// Phase 2: Solid hold — logo flash                        (900 → 1400ms)
// Phase 3: Bars continue sweeping RIGHT, revealing scene   (1400 → 2300ms)
// Total: 2.4s
const TOTAL    = 3200;
const COVER_AT = 1200;  // screen fully covered
const EXIT_AT  = 2000;  // bars start exiting
const TP       = 1600;  // OBS transition point (middle of hold)

// ─── Bar config ───────────────────────────────────
const SKEW     = -8 * Math.PI / 180;  // subtle slant
const BARS = [
  { w:360, color:SC.colors.red,    delay:0,   opacity:1   },
  { w:480, color:SC.colors.bg,     delay:60,  opacity:1   },
  { w:260, color:SC.colors.red,    delay:120, opacity:1   },
  { w:200, color:SC.colors.orange, delay:170, opacity:1   },
  { w:650, color:SC.colors.bg,     delay:220, opacity:1   },
  { w:300, color:SC.colors.red,    delay:280, opacity:0.5 },
  { w:200, color:SC.colors.orange, delay:330, opacity:0.7 },
];

const SWEEP_IN  = 900;  // ms for each bar to sweep in (slower)
const SWEEP_OUT = 900;  // ms for each bar to sweep out (slower)

// Logo
const logo = new Image();
logo.src = SC.brand.logo;

function ease(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2; // easeInOutCubic
}

function drawFrame(t) {
  // Black background (will be covered by bars, then revealed as bars exit)
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 1920, 1080);

  // ── Draw bars ──
  for (const bar of BARS) {
    let x;

    // Phase 1: Sweep in from left
    const tIn = (t - bar.delay) / SWEEP_IN;
    // Phase 3: Sweep out to right
    const exitDelay = EXIT_AT + bar.delay;
    const tOut = (t - exitDelay) / SWEEP_OUT;

    if (tOut > 0) {
      // Exiting — continue rightward from resting position
      const restX = 2500 - 400; // where bar stopped after sweep-in
      const p = Math.min(1, ease(Math.min(1, tOut)));
      x = restX + p * 2400;
    } else if (tIn > 0) {
      // Entering — sweep from off-screen left to cover position
      const p = Math.min(1, ease(Math.min(1, tIn)));
      x = -500 + p * (2500 + 500 - 400);
    } else {
      continue;
    }

    ctx.save();
    ctx.transform(1, 0, Math.tan(SKEW), 1, 0, 0);
    ctx.fillStyle = bar.color;
    ctx.globalAlpha = bar.opacity;
    ctx.fillRect(x, -200, bar.w, 1480);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // ── Solid black fill during hold phase ──
  if (t >= COVER_AT && t <= EXIT_AT) {
    ctx.fillStyle = SC.colors.bg;
    ctx.fillRect(0, 0, 1920, 1080);
  }

  // ── Brand logo + name during hold ──
  const brandIn  = COVER_AT + 80;
  const brandOut = EXIT_AT - 80;
  if (t >= brandIn && t <= brandOut) {
    const fadeIn  = Math.min(1, (t - brandIn) / 300);
    const fadeOut = Math.min(1, (brandOut - t) / 300);
    const alpha   = Math.min(fadeIn, fadeOut);
    const scale   = 0.9 + alpha * 0.1;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(960, 540);
    ctx.scale(scale, scale);

    // Logo
    if (logo.complete && logo.naturalWidth > 0) {
      ctx.drawImage(logo, -80, -24, 48, 48);
    }

    // Red rule
    const rg = ctx.createLinearGradient(-22, -20, -22, 20);
    rg.addColorStop(0, 'transparent');
    rg.addColorStop(0.5, SC.colors.red);
    rg.addColorStop(1, 'transparent');
    ctx.fillStyle = rg;
    ctx.fillRect(-23, -20, 2, 40);

    // Name
    ctx.fillStyle = '#fff';
    ctx.font = '900 20px "Arial Black", Impact, sans-serif';
    ctx.letterSpacing = '6px';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = SC.colors.red;
    ctx.shadowBlur = 20;
    ctx.fillText(SC.brand.name, -10, 0);
    ctx.shadowBlur = 0;

    ctx.restore();
  }
}

// ─── Export ─────────────────────────────────────────
function startExport() {
  btn.disabled = true;
  sts.textContent = 'RECORDING...';
  ui.classList.add('hidden');

  const stream   = cvs.captureStream(60);
  const recorder = new MediaRecorder(stream, {
    mimeType: 'video/webm;codecs=vp9',
    videoBitsPerSecond: 10000000,
  });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'sasi-stinger.webm';
    a.click();

    ui.classList.remove('hidden');
    btn.disabled = false;
    sts.textContent = 'DONE! In OBS Stinger properties set Transition Point to ' + TP + ' ms';
  };

  recorder.start();

  const t0 = performance.now();
  function tick(now) {
    const t = now - t0;
    if (t > TOTAL + 200) {
      recorder.stop();
      return;
    }
    drawFrame(Math.min(t, TOTAL));
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Preview first frame
drawFrame(0);
</script>
</body>
</html>
