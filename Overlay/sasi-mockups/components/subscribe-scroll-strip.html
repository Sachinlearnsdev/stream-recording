<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subscribe — Scrolling Strip</title>
<style>
:root { --red:#FF2200; --orange:#FF7700; --gold:#FFD700; --bg:#050005; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:#050005;
  font-family:'Inter','Helvetica Neue',Arial,sans-serif;
  color:#fff;
}

/* Simple scrolling strip — (white bell) Subscribe  (white bell) Subscribe  … */
.strip {
  position:absolute;
  bottom:110px; left:0; right:0;
  height:64px;
  background:
    linear-gradient(180deg, rgba(8,0,2,.82) 0%, rgba(4,0,1,.92) 50%, rgba(8,0,2,.82) 100%);
  display:flex; align-items:center;
  overflow:hidden;
  opacity:0; animation:stripIn .6s ease forwards;
}
@keyframes stripIn { to { opacity:1; } }

/* Thin red hairlines — the only "frame" */
.strip::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,34,0,.55) 12%, rgba(255,34,0,.55) 88%, transparent);
}
.strip::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,34,0,.35) 12%, rgba(255,34,0,.35) 88%, transparent);
}

/* Edge fade so items ghost in/out of the screen edges */
.strip-mask {
  position:absolute; inset:0;
  background:linear-gradient(90deg, #050005 0%, transparent 5%, transparent 95%, #050005 100%);
  pointer-events:none; z-index:5;
}

.track {
  display:flex; align-items:center;
  flex-shrink:0;
  white-space:nowrap;
  will-change:transform;
  animation:scrollLR 22s linear infinite;
}
@keyframes scrollLR {
  from { transform:translateX(-50%); }
  to   { transform:translateX(0); }
}

/* Each item — white icon + red italic text, tight spacing */
.item {
  display:inline-flex; align-items:center; gap:10px;
  padding:0 22px;
}
.item-icon {
  display:flex; align-items:center; justify-content:center;
  width:24px; height:24px;
  flex-shrink:0;
}
.item-icon svg {
  width:100%; height:100%;
  fill:#fff;
}
.item-text {
  font-size:26px;
  font-weight:900;
  font-style:italic;
  letter-spacing:.5px;
  color:var(--red);
  text-shadow:0 0 12px rgba(255,34,0,.4);
  white-space:nowrap;
}

.stage-label {
  position:absolute; top:60px; left:60px;
  font-size:11px; font-weight:900; letter-spacing:5px;
  color:rgba(255,255,255,.25); text-transform:uppercase;
}
</style>
</head>
<body>

<div class="stage-label">★ SUBSCRIBE · Scrolling Strip</div>

<div class="strip">
  <div class="track" id="track"></div>
  <div class="strip-mask"></div>
</div>

<script>
const BELL_SVG = '<svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4a2 2 0 0 0 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>';

// Build 18 copies (tighter spacing needs more items to fill the loop), duplicate for seamless scroll
const REPEAT = 18;
const html = Array.from({length: REPEAT}, () =>
  `<div class="item"><div class="item-icon">${BELL_SVG}</div><div class="item-text">SUBSCRIBE</div></div>`
).join('');

document.getElementById('track').innerHTML = html + html;
</script>

</body>
</html>
